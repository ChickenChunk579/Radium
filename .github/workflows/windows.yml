name: Build (windows)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Install MSYS2 (for patch)
        uses: msys2/setup-msys2@v2
        with:
          update: true
          install: patch
          msystem: MINGW64

      - name: Setup repository (clone + patch)
        shell: cmd
        run: |
          cd subprojects
          call clone.bat
          call patch.bat
          cd Rune\subprojects
          call clone.bat

      - name: Configure with CMake for MSVC + Ninja
        shell: cmd
        run: |
          mkdir build
          cd build
          call "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvars64.bat"
          cmake -G "Ninja" -DCMAKE_BUILD_TYPE=Release ..

      - name: Build with Ninja
        shell: cmd
        run: |
          call "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvars64.bat"
          cd build
          ninja

      - name: Create zip artifact
        run: |
          cd build
          powershell Compress-Archive -Path RadiumRuntime,Editor,libRadium.lib,subprojects\Rune\libRune.lib -DestinationPath artifact.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-build-artifact
          path: build/artifact.zip
